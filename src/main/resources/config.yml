# General settings and plugin-managed data live here.
# Static punishments, rules, and custom messages were moved to:
# - punishments.yml
# - rules.yml
# - messages.yml

# Runtime-managed player data examples:
# player-times: {}
# player-weather: {}
# pending-teleports: {}

freeze:
  message: "&cYou are currently frozen."
  title: "&c&lFROZEN"
  subtitle: "&7You cannot move or use commands."
  title-refresh-ticks: 40
  title-stay-ticks: 80

notifications:
  bossbar:
    enabled: false
    color: WHITE
    overlay: PROGRESS
    progress: 1.0
    switch-seconds: 10
    messages:
      - "<gold>Welcome to <yellow>Sage</yellow></gold>"
  announcements:
    enabled: false
    interval-seconds: 300
    messages:
      - "<gold>Welcome to the server.</gold> <gray>Enjoy your stay.</gray>"
  channels:
    staff:
      webhook-url: ""
    admin:
      webhook-url: ""

commands:
  clear:
    enabled: true
  dispose:
    enabled: true
  respawn:
    enabled: true
  rules:
    enabled: true
